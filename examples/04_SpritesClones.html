<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>MGE example: Sprite clones</title>
    </head>

    <!-- These body properties aim at centering the game canvas in the screen-->
    <body style="min-height: 100%;display: flex;align-items: center;justify-content: center;height: 100vh"> 
        <!-- IMPORT MGE LIBRARY-->
        <script src="mge_V1.3.0.js"></script>

        <!-- GAME-->
        <script>
            // Set the game properties
            mge.game.width = 800
            mge.game.height = 600

            //////////////////////////
            // SPRITE EXAMPLE
            //////////////////////////
            // Create a sprite object
            let sprite = mge.game.createSprite()
            // Set its properties
            sprite.width = 10
            sprite.height = 10
            // Create its "draw function" (mandatory)
            sprite.drawFunction = function (ctx) {
                ctx.fillStyle='blue'
                ctx.fillRect(0,0,10,10)
            }
           // Create a specific update method
            sprite.update = function () {
                this.x += 0.5
                this.y += 0.5
            }
            //////////////////////////

            // Create the main scene
            let mainScene = {
                start:function() {
                    // Create a first clone when the scene starts
                    let firstSpriteClone = sprite.cloneCreate()
                    firstSpriteClone.x = 50
                    firstSpriteClone.y = 50
                },
                update:function() {
                    // If the mouse is clicked, then create a sprite clone wher the mouse is located
                    if (mge.mouse.isClicked) {
                        let spriteClone = sprite.cloneCreate()
                        spriteClone.x = mge.mouse.x
                        spriteClone.y = mge.mouse.y
                    }
                    // Call the update method for all the clones
                    sprite.cloneExecuteForEach('update')
                },
                draw: function() {
                    // Draw canvas background
                    let ctx = mge.game.context
                    ctx.fillStyle = 'LightGray'
                    ctx.fillRect(0,0,mge.game.width, mge.game.height)
                    // Draw text instructions
                    ctx.fillStyle = 'Black'
                    ctx.font = "16px serif"
                    ctx.fillText("Click to create sprites clones", 10, 50)
                    // Draw all the clones
                    sprite.cloneExecuteForEach('draw')
                }
            }
            // Start the game using the basic scene
            mge.game.start(mainScene)

        </script>
    </body>
</html>
