<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>MGE example: Sequencer</title>
    </head>

    <!-- These body properties aim at centering the game canvas in the screen-->
    <body style="min-height: 100%;display: flex;align-items: center;justify-content: center;height: 100vh"> 
        <!-- IMPORT MGE LIBRARY-->
        <script src="mge_V1.3.0.js"></script>

        <!-- GAME-->
        <script>
            // Set the game properties
            mge.game.width = 800
            mge.game.height = 600

            // SIMPLE SYNTH
            let synth = mge.game.createSynthetizer(
                 [{_type:'triangle',
                   _volumeADSR:{a:0.02,d:0.5,s:0.2,r:0.15,minValue:0,maxValue:1}}]
            )
            //////////////////////////
            // SEQUENCER EXAMPLE
            //////////////////////////
            // BASS TRACK (4 bars, volume 0.8)
            mge.sequencer.createTrack([['D2',4],['G2',4],['C2',4],['C2',4]],synth,1)
            // ARPEGIATOR TRACK (4 bars, volume 0.8)
            mge.sequencer.createTrack([['D3',1,'F3',1,'A3',1,'C4',1],['B3',1,'G3',1,'F3',1,'D3',1],['E3',1,'G3',1,'B3',1,'D4',1],['C4',1,'B3',1,'G3',1,'E3',1]],synth,0.8)
            // Define tempo
            mge.sequencer.bpm = 120 

            // Create the main scene
            let mainScene = {
                start:function() {},
                update:function() {
                    // If the mouse is clicked, play the sequencer
                    if (mge.mouse.isClicked) {
                        mge.sequencer.stop() 
                        mge.sequencer.start() 
                    }
                    // if s is pressed, stop the sequencer
                    if (mge.keyboard.isKeyPressed('s')){
                        mge.sequencer.stop() 
                    }
                },
                draw: function() {
                    let ctx = mge.game.context
                    ctx.font = "48px serif"
                    ctx.fillText("Click to start, press s to stop", 10, 100)
                }
            }
            // Start the game using the basic scene
            mge.game.start(mainScene)

        </script>
    </body>
</html>
